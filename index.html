<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المسابقة العلمية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-logo"></div>

    <div class="container">
        
        <div id="screen-start" class="screen active">
            <button id="btn-new-game" class="main-btn">مسابقة جديدة</button>
            <button id="btn-edit-db" class="main-btn" onclick="openEditScreen()">تعديل الأسئلة</button>
            <button id="btn-reset-used" class="main-btn" onclick="resetUsedQuestions()">رفع جميع التضليل</button>
        </div>

        <div id="screen-setup" class="screen hidden">
            <div class="horizontal-box">
                <h2>إعداد المسابقة</h2>
                <input type="text" id="team1-input" placeholder="اسم الفريق الأول (مثال: الفريق 1)">
                <input type="text" id="team2-input" placeholder="اسم الفريق الثاني (مثال: الفريق 2)">
                <button id="btn-enter" class="main-btn">دخول</button>
            </div>
        </div>

        <div id="screen-edit" class="screen hidden">
            <div class="horizontal-box" style="width: 100%;">
                <h2>تعديل المواد والأسئلة</h2>
                <div class="edit-controls">
                    <select id="edit-subject-select" onchange="loadEditSubject()"></select>
                    <select id="edit-question-select" onchange="loadEditQuestion()"></select>
                </div>
                <div class="edit-form">
                    <input type="text" id="edit-subject-name" placeholder="اسم المادة">
                    <input type="text" id="edit-q-text" placeholder="نص السؤال">
                    <input type="text" id="edit-opt0" placeholder="الخيار 1">
                    <input type="text" id="edit-opt1" placeholder="الخيار 2">
                    <input type="text" id="edit-opt2" placeholder="الخيار 3">
                    <input type="text" id="edit-opt3" placeholder="الخيار 4">
                    <input type="number" id="edit-correct" min="0" max="3" placeholder="رقم الإجابة الصحيحة (0-3)">
                    <button class="main-btn" onclick="saveEditedQuestion()">حفظ التعديل</button>
                    <button class="back-btn" onclick="showScreen('screen-start')">عودة للرئيسية</button>
                </div>
            </div>
        </div>

        <div id="screen-board" class="screen hidden">
            <div class="horizontal-layout">
                <div class="teams-section">
                    <div class="team-card">
                        <h3 id="display-team1">الفريق 1</h3>
                        <p>النقاط: <span id="score-team1">0</span></p>
                    </div>
                    <div class="team-card">
                        <h3 id="display-team2">الفريق 2</h3>
                        <p>النقاط: <span id="score-team2">0</span></p>
                    </div>
                </div>
                <div class="subjects-container">
                    <button class="subject-btn" id="sub-btn-0" onclick="openSubject(0)">المادة 1</button>
                    <button class="subject-btn" id="sub-btn-1" onclick="openSubject(1)">المادة 2</button>
                    <button class="subject-btn" id="sub-btn-2" onclick="openSubject(2)">المادة 3</button>
                    <button class="subject-btn" id="sub-btn-3" onclick="openSubject(3)">المادة 4</button>
                </div>
            </div>
            <button class="back-btn" onclick="endGame()" style="margin-top: 30px;">إنهاء المسابقة</button>
        </div>

        <div id="screen-questions" class="screen hidden">
            <div class="horizontal-box">
                <h2 id="current-subject-title">المادة</h2>
                <div id="questions-grid" class="questions-grid">
                </div>
                <button id="back-to-board-btn" class="back-btn" onclick="showScreen('screen-board')">الصفحة الرئيسية</button>
            </div>
        </div>

        <div id="screen-active-question" class="screen hidden">
            <div class="horizontal-layout">
                <div class="question-side">
                    <h3 id="turn-indicator">السؤال 1</h3>
                    
                    <div class="question-box">
                        <h2 id="question-text">نص السؤال يظهر هنا؟</h2>
                    </div>
                    
                    <div class="controls-row">
                        <button class="main-btn" onclick="nextQuestion()">السؤال التالي</button>
                        <button class="back-btn" onclick="showScreen('screen-questions')">زر رجوع</button>
                    </div>
                </div>

                <div class="options-side">
                    <div class="active-scores-display">
                        <span id="active-score-t1-display">الفريق 1: 0</span>
                        <span id="active-score-t2-display">الفريق 2: 0</span>
                    </div>

                    <div class="timer-container">
                        <button id="btn-start-timer" class="main-btn">ابدأ العداد</button>
                        <div class="timer-circle">
                            <span id="timer-text">30</span>
                        </div>
                    </div>

                    <div class="options-grid">
                        <button class="option-btn" onclick="checkAnswer(0)" id="opt0">الخيار 1</button>
                        <button class="option-btn" onclick="checkAnswer(1)" id="opt1">الخيار 2</button>
                        <button class="option-btn" onclick="checkAnswer(2)" id="opt2">الخيار 3</button>
                        <button class="option-btn" onclick="checkAnswer(3)" id="opt3">الخيار 4</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="correct-modal" class="modal hidden">
            <div class="modal-content">
                <h2 style="color: green;">إجابة صحيحة! 🎉</h2>
                <p>إضافة النقاط (يدوياً):</p>
                <div class="modal-buttons-row">
                    <button class="main-btn" onclick="awardPoint(1)" id="award-t1">الفريق 1</button>
                    <button class="main-btn" onclick="awardPoint(2)" id="award-t2">الفريق 2</button>
                    <button class="main-btn" onclick="awardPoint(3)" id="award-both">إجابة مزدوجة (نقطة للفريقين)</button>
                </div>
                <br>
                <button class="back-btn" onclick="closeModal()">إغلاق النافذة</button>
            </div>
        </div>

    </div>

    <div id="celebration-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center;">
        <h1 id="countdown-display" style="color: #FF5722; font-size: 15rem; display: none; text-shadow: 0 0 40px #FF5722, 0 0 80px #FF5722; animation: pulseRed 1s infinite;">5</h1>
        <div id="winner-display" style="display: none; text-align: center; z-index: 10000;">
            <h1 id="winner-text" style="color: #FFD700; font-size: 6rem; text-shadow: 0 0 40px #FF9800, 0 0 80px #FFD700; transform-style: preserve-3d; animation: float3d 2s infinite alternate;"></h1>
            <button class="main-btn" onclick="location.reload()" style="font-size: 2.5rem; padding: 20px 50px; margin-top: 50px; box-shadow: 0 0 20px #fff;">حسناً</button>
        </div>
        <div id="balloons-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
